spring:
  application:
    name: tripledger
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tripledger}
    username: ${SPRING_DATASOURCE_USERNAME:tripledger}
    password: ${SPRING_DATASOURCE_PASSWORD:tripledger_dev_password}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
  error:
    whitelabel:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

logging:
  level:
    root: ${TRIPLEDGER_LOG_LEVEL:INFO}
  pattern:
    level: "%5p [correlationId:%X{correlationId:-}]"

tripledger:
  allowed-origins: ${TRIPLEDGER_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
